name: Daily DOU Scraping

on:
  schedule:
    # Roda todos os dias às 06:00 UTC (03:00 Brasília)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite executar manualmente

jobs:
  scraping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd scraping
          pip install -r requirements.txt
      
      - name: Run scraping
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          cd scraping
          python dou_scraper.py
      
      - name: Send WhatsApp alerts (pending)
        # Isso seria processado por um worker separado
        run: echo "Alertas serão processados pelo backend Next.js"
